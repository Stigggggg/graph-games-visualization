version: '3.8'

services:
  flask:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./flask:/app
    environment:
      - FLASK_DEBUG=1

  src:
    build: ./src
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app
      - /app/node_modules
    depends_on:
      - flask